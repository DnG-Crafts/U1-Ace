[ace_device]


# device_version selects which MMU protocol to speak.
#   auto  - detect ACE 1 Pro (ANYCUBIC USB id) or ACE 2 Pro (1a86 USB id)
#           from /dev/serial/by-id. Preferred.
#   ace1  - force ACE 1 Pro (JSON-over-serial, 115200 baud)
#   ace2  - force ACE 2 Pro (protobuf-over-serial, 230400 baud)

device_version: auto


# these are the serial connection options and should not need to be modified.
# when device_version is auto, the serial path is overridden by whatever
# ACE device is actually plugged in. baud is auto-upgraded to 230400 when an
# ACE 2 Pro is detected and baud was left at the ACE 1 default (115200).

serial: /dev/serial/by-id/usb-ANYCUBIC_ACE_1-if00
baud: 115200


# speeds, 100 seems to be the maximum speed the ace will allow

feed_speed: 70
load_speed: 100


# retract_speed: speed (mm/s) for the ACE-driven ROLLBACK (mode=1)
# that pulls filament back to the spool after an unload completes.

retract_speed: 100


# ACE 2 feed-check window (SET_FEED_CHECK command sent during initialization).
# check_len: how many mm the encoder must see within the command window.
# error_len: how many mm triggers a feed error.

feed_check_len: 254
feed_check_error_len: 254



# feeder mode allows you to leave the original U1 feeders on the printer
# and connect the ace to the U1 feeders on the sides of the printer.
# this allows you to still use the side spools if you needed.
# setting this to True will enable that functionality

enable_feeder_mode: False



# feed assist, setting this to False will disable feed assist

enable_feed_assist: True


# Direction-confirmation window for feed_assist <-> unwind_assist mode
# flips. When live_extruder_velocity reverses sign mid-print (e.g. a
# slicer retract briefly hits -33 mm/s), we don't flip mode immediately
# -- we require the new direction to be sustained for this many seconds
# before committing. Brief reversals shorter than this window get
# filtered out and never generate stop+start packets on the wire. Real
# unloads (multi-second sustained retract) flip after this delay.
#
# Lower (e.g. 0.5) for snappier response to legitimate direction
# changes; higher (e.g. 2.0) to filter even slow slicer retracts.

assist_mode_confirm_time: 0.5


# Verbose logging for the assist loop -- one line per second of velocity
# readings, every encoder feedback adjustment, and every speed update.
# Disable for a quieter klippy.log once everything is dialed in.

assist_verbose_logging: False


# Stop assist this many seconds after the toolhead's commanded extruder
# velocity drops to zero.

feed_assist_idle_timeout: 5


# disable u1 rfid reader, setting this to True will disable the internal rfid reader of the printer
# this will stop the printer detecting spools on the sides of the printer while loading with ace.

disable_u1_rfid: False



# force generic vendor for all spools detected by rfid.
# this allows the filament to be selected in snapmaker orca with default generic filaments.

force_generic: False



# max temp for dryer

max_dryer_temperature: 55


# slot 1 2 3 4 are the individual numbered feeders/extruders
# this allows for different settings per slot


# the feed length is the distance from the ace to the u1
# the script detects the filament hitting the u1 sensor
# this only needs to be modified if the filament does not reach the u1 feeder

feed_length_slot1: 1000
feed_length_slot2: 1000
feed_length_slot3: 1000
feed_length_slot4: 1000


# the load length is the distance from the u1 feeder to the extruder
# these values should be fine unless you have extended the tubes

load_length_slot1: 850
load_length_slot2: 850
load_length_slot3: 850
load_length_slot4: 850


# the retract length is how far the ace retracts the filament when you
# unload the filament from the u1 touch screen menu. one single long
# rollback is issued; the retract is treated as finished as soon as the
# slot's status flips to empty or ready. 3000 mm (3 m) covers a long
# PTFE tube in one shot with margin -- set lower if you want a tighter
# bound or to leave more filament near the buffer.

retract_length_slot1: 3000
retract_length_slot2: 3000
retract_length_slot3: 3000
retract_length_slot4: 3000


[gcode_macro TEST_ACE_FEEDBACK]
description: Run a controlled extrusion to exercise the ACE feed-assist
   feedback loop. Watch klippy.log for "ACE: live_extruder_velocity",
   "ACE: feed_info", and "ACE: feedback ..." lines.
gcode:
   {% set rate = params.RATE|default(5)|float %}    ; mm/s of filament feed
   {% set length = params.LENGTH|default(50)|float %} ; total mm to feed
   {% set retract = params.RETRACT|default(0)|float %} ; mm to retract after
   {% set temp = params.TEMP|default(220)|int %}      ; nozzle temp
   {% set heat = params.HEAT|default(1)|int %}        ; whether to heat
   M83
   {% if heat %}
   M109 S{temp}
   {% endif %}
   G1 E{length} F{rate * 60}
   M400
   {% if retract > 0 %}
   G4 P500
   G1 E-{retract} F{rate * 60}
   M400
   {% endif %}
   {% if heat %}
   M104 S0
   {% endif %}


[gcode_macro Start_Ace_Dryer]
gcode:
    {% set max_temp = printer.configfile.settings['ace_device'].max_dryer_temperature|int %}
    {% set target_temp = params.TEMPERATURE|default(55)|int %}
    {% set dry_time = params.DURATION|default(240)|int %}
    {% if target_temp > max_temp %}
        { action_respond_info("Target temp %dC is too high! Capping to %dC based on [ace_device] config." % (target_temp, max_temp)) }
        {% set target_temp = max_temp %}
    {% endif %}
    ACE_START_DRYING TEMPERATURE={target_temp} DURATION={dry_time}
	
	
[gcode_macro Stop_Ace_Dryer]
gcode:
    ACE_STOP_DRYING
